<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIFT-FLOW · Halterofilia S1</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:#111}
  ::-webkit-scrollbar-thumb{background:#e63030}
  body{background:#0a0a0a;color:#f0f0f0;font-family:'Barlow Condensed','Arial Narrow',sans-serif;letter-spacing:.02em;min-height:100vh}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .3s ease forwards}
  /* TABS */
  .tabs{display:flex;overflow-x:auto;border-bottom:1px solid #222;background:#0e0e0e;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab-btn{padding:12px 16px;font-size:11px;font-weight:700;letter-spacing:1.5px;font-family:'Barlow Condensed',sans-serif;border-right:1px solid #1a1a1a;min-width:80px;text-align:center;text-transform:uppercase;color:#555;transition:all .2s;white-space:nowrap;border:none;cursor:pointer;background:transparent}
  .tab-btn.active{background:#e63030;color:#fff}
  .tab-btn:hover:not(.active){color:#e63030}
  .day-panel{display:none;padding:18px 14px;animation:fadeIn .3s ease forwards}
  .day-panel.active{display:block}
  /* BLOCKS */
  .block{margin-bottom:18px}
  .block-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:3px;color:#e63030;font-weight:700;text-transform:uppercase;padding:7px 12px;background:#141414;border-left:3px solid #e63030;margin-bottom:2px}
  /* MOBILITY LIST */
  .mob-list{background:#0e0e0e;border:1px solid #1e1e1e;padding:10px 14px}
  .mob-item{font-size:13px;color:#ccc;padding:5px 0;border-bottom:1px solid #1a1a1a;font-family:'Barlow',sans-serif;display:flex;align-items:flex-start;gap:8px;line-height:1.4}
  .mob-item:last-child{border-bottom:none}
  .mob-item::before{content:'•';color:#e63030;font-size:16px;line-height:1;flex-shrink:0}
  /* SETS TABLE */
  .sets-table{width:100%;border:1px solid #1e1e1e;overflow:hidden}
  .sets-header{display:grid;grid-template-columns:1fr 60px 60px;background:#141414;padding:8px 12px;font-size:10px;color:#555;letter-spacing:2px;font-weight:700;border-bottom:1px solid #1e1e1e}
  .set-row{display:grid;grid-template-columns:1fr 60px 60px;padding:9px 12px;border-bottom:1px solid #1a1a1a;align-items:center;transition:background .15s}
  .set-row:last-child{border-bottom:none}
  .set-row:hover{background:rgba(230,48,48,.05)}
  .set-row:nth-child(odd){background:#0e0e0e}
  .set-row:nth-child(odd):hover{background:rgba(230,48,48,.07)}
  .set-series{font-size:13px;color:#aaa;font-family:'Barlow',sans-serif}
  .set-reps{text-align:center;font-size:14px;font-weight:700;color:#e63030;font-family:'Barlow Condensed',sans-serif}
  .set-pct{text-align:center;font-size:12px;color:#888;font-family:'Barlow',sans-serif}
  /* RM CARD */
  .rm-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:18px}
  .rm-card{background:#0e0e0e;border:1px solid #1e1e1e;border-top:2px solid #e63030;padding:12px}
  .rm-move{font-size:10px;letter-spacing:2px;color:#e63030;font-weight:700;text-transform:uppercase;margin-bottom:4px}
  .rm-vals{display:flex;justify-content:space-between;align-items:flex-end}
  .rm-current{font-size:22px;font-weight:900;line-height:1}
  .rm-arrow{font-size:16px;color:#555}
  .rm-goal{font-size:18px;font-weight:700;color:#e08080}
  /* REGISTRO */
  .reg-table{width:100%;border:1px solid #1e1e1e;overflow:hidden}
  .reg-header{display:grid;grid-template-columns:90px 60px 1fr 70px;background:#141414;padding:9px 12px;font-size:9px;color:#555;letter-spacing:1.5px;font-weight:700;border-bottom:1px solid #1e1e1e;text-transform:uppercase}
  .reg-row{display:grid;grid-template-columns:90px 60px 1fr 70px;padding:11px 12px;border-bottom:1px solid #1a1a1a;align-items:center}
  .reg-row:last-child{border-bottom:none}
  .reg-day{font-size:13px;font-weight:600}
  .reg-input{background:#0a0a0a;border:1px solid #2a2a2a;color:#f0f0f0;font-size:12px;padding:4px 6px;width:100%;font-family:'Barlow',sans-serif;text-align:center}
  .reg-input:focus{outline:none;border-color:#e63030}
  .reg-bloque{background:#0a0a0a;border:1px solid #2a2a2a;color:#f0f0f0;font-size:11px;padding:4px 6px;width:100%;font-family:'Barlow',sans-serif}
  .reg-bloque:focus{outline:none;border-color:#e63030}
  /* TAGS */
  .pill{background:rgba(230,48,48,.15);border:1px solid rgba(230,48,48,.4);color:#e63030;font-size:10px;letter-spacing:2px;font-weight:700;padding:3px 8px;text-transform:uppercase;display:inline-block;margin:2px}
  .tag-badge{background:rgba(230,48,48,.15);border:1px solid #e63030;color:#e63030;padding:5px 12px;font-size:10px;letter-spacing:2px;font-weight:700;text-transform:uppercase}
  .section-divider{display:flex;align-items:center;gap:10px;padding:6px 12px;background:#111;border-top:1px solid #1a1a1a;border-bottom:1px solid #1a1a1a;margin:4px 0}
  .section-divider .line{flex:1;height:1px;background:rgba(230,48,48,.2)}
  .section-divider span{font-size:9px;letter-spacing:3px;color:#e63030;font-weight:700;text-transform:uppercase}
  @media(max-width:420px){
    .rm-grid{grid-template-columns:1fr}
    .sets-header,.set-row{grid-template-columns:1fr 50px 50px}
    .reg-header,.reg-row{grid-template-columns:80px 50px 1fr 60px}
  }
</style>
</head>
